<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BHU MCA Semester 2 CGPA Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#003366;
margin-bottom:20px;
}

h3{
margin-top:20px;
color:#0056b3;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
border:none;
background:#0056b3;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#003d80;
}

.result{
margin-top:25px;
padding:20px;
background:#e8f5e9;
border-radius:10px;
display:none;
}

.result h2{
color:#006400;
margin-bottom:10px;
}

hr{
margin:10px 0;
}
</style>
</head>
<body>

<div class="container">

<h1>BHU MCA Semester 2 CGPA Calculator</h1>

<label>Student Name *</label>
<input type="text" id="name" placeholder="Enter your name">

<h3>Database Management System (6 Credits)</h3>
<input type="number" id="dbmsTheory" placeholder="Theory Marks">
<input type="number" id="dbmsPractical" placeholder="Practical Marks">

<h3>Network Security (4 Credits)</h3>
<input type="number" id="nsTheory" placeholder="Theory Marks">
<input type="number" id="nsPractical" placeholder="Practical Marks">

<h3>Artificial Intelligence (4 Credits)</h3>
<input type="number" id="ai" placeholder="Marks">

<h3>Data Mining (4 Credits)</h3>
<input type="number" id="dmTheory" placeholder="Theory Marks">
<input type="number" id="dmPractical" placeholder="Practical Marks">

<h3>SWAYAM (2 Credits)</h3>
<input type="number" id="swayam" placeholder="Marks">

<button onclick="calculate()">Calculate CGPA</button>

<div class="result" id="result">
<h2>Result</h2>

<div id="output"></div>

</div>

</div>

<script>

function gradePoint(mark){

if(mark >= 90) return 10;
if(mark >= 80) return 9;
if(mark >= 70) return 8;
if(mark >= 60) return 7;
if(mark >= 50) return 6;
if(mark >= 40) return 5;

return 0;
}

function calculate(){

let name = document.getElementById("name").value.trim();

if(name === ""){
alert("Please enter your name");
return;
}

let dbmsTheory = Number(document.getElementById("dbmsTheory").value);
let dbmsPractical = Number(document.getElementById("dbmsPractical").value);

let nsTheory = Number(document.getElementById("nsTheory").value);
let nsPractical = Number(document.getElementById("nsPractical").value);

let ai = Number(document.getElementById("ai").value);

let dmTheory = Number(document.getElementById("dmTheory").value);
let dmPractical = Number(document.getElementById("dmPractical").value);

let swayam = Number(document.getElementById("swayam").value);

if(
isNaN(dbmsTheory) ||
isNaN(dbmsPractical) ||
isNaN(nsTheory) ||
isNaN(nsPractical) ||
isNaN(ai) ||
isNaN(dmTheory) ||
isNaN(dmPractical) ||
isNaN(swayam)
){
alert("Please fill all marks.");
return;
}

let dbmsFinal = (dbmsTheory * 0.6) + (dbmsPractical * 0.4);
let nsFinal = (nsTheory * 0.6) + (nsPractical * 0.4);
let dmFinal = (dmTheory * 0.6) + (dmPractical * 0.4);

let totalCreditPoints =
(gradePoint(dbmsFinal) * 6) +
(gradePoint(nsFinal) * 4) +
(gradePoint(ai) * 4) +
(gradePoint(dmFinal) * 4) +
(gradePoint(swayam) * 2);

let cgpa = (totalCreditPoints / 20).toFixed(2);

let percentage = ((cgpa * 10) - 4.5).toFixed(2);

document.getElementById("result").style.display = "block";

document.getElementById("output").innerHTML = `
<p><strong>Name:</strong> ${name}</p>

<hr>

<p><strong>DBMS Final Marks:</strong> ${dbmsFinal.toFixed(2)}</p>
<p><strong>Network Security Final Marks:</strong> ${nsFinal.toFixed(2)}</p>
<p><strong>Data Mining Final Marks:</strong> ${dmFinal.toFixed(2)}</p>

<hr>

<p><strong>CGPA:</strong> ${cgpa}</p>

<p><strong>Percentage:</strong> ${percentage}%</p>
`;
}

</script>

</body>
</html>
